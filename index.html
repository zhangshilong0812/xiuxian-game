<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>仙途·问道</title><style>:root{--bg:#0a0a0f;--panel:#12121a;--gold:#d4a574;--text:#c8c0b8;--border:#2a2a35;--rarity-white:#b8b8b8;--rarity-green:#5cb878;--rarity-blue:#5b9bd5;--rarity-purple:#b07cd8;--rarity-gold:#e2b04a;--rarity-red:#ff5555}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Noto Serif SC',serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:var(--text);user-select:none;background-image:radial-gradient(ellipse at 50% 30%,rgba(180,140,100,0.06) 0%,transparent 70%)}.game-container{width:100%;max-width:520px;min-height:100vh;padding:12px;display:flex;flex-direction:column;gap:10px}.top-bar{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}.top-bar .title{font-size:1.3rem;font-weight:bold;background:linear-gradient(180deg,#f0d6b8 0%,#c89650 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;cursor:pointer}.spirit-stones{display:flex;align-items:center;gap:6px;background:#1a1410;border:1px solid #4a3020;border-radius:20px;padding:6px 14px;font-weight:bold;color:#f0d6b8;font-size:0.95rem}.main-panel{flex:1;display:flex;flex-direction:column;gap:10px}.panel-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}.panel-title{font-size:0.9rem;color:var(--gold);letter-spacing:1px;margin-bottom:10px;font-weight:bold;display:flex;align-items:center;gap:6px}.team-preview{display:flex;gap:8px;min-height:70px;align-items:center;flex-wrap:wrap}.team-slot{flex:1;min-width:70px;aspect-ratio:3/4;max-width:100px;border-radius:10px;border:2px dashed #333;displa adow:0 0 20px rgba(226,176,74,0.3)}.card-rarity-red{background:linear-gradient(180deg,#3a1018 0%,#1a080c 100%);border:2px solid #ff5555;color:#ff9999;box-shadow:0 0 25px rgba(255,85,85,0.4);animation:glowRed 2s infinite}@keyframes glowRed{0%,100%{box-shadow:0 0 25px rgba(255,85,85,0.4)}50%{box-shadow:0 0 45px rgba(255,85,85,0.7)}}.inventory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:8px;max-height:300px;overflow-y:auto}.inv-card{aspect-ratio:3/4.2;border-radius:10px;padding:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:all 0.2s;font-size:0.7rem}.inv-card:hover{transform:translateY(-4px)}.inv-card.selected{outline:3px solid #fff;outline-offset:2px}.battle-field{display:flex;flex-direction:column;gap:10px}.battle-side{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:#0d0d16;border:1px solid #222}.battle-char{flex:1;text-align:center;padding:8px;border-radius:10px}.hp-bar-outer{height:8px;background:#1a1a1a;border-radius:10px;margin-top:4px;overflow:hidden}.hp-bar-inner{height:100%;border-radius:10px;transition:width 0.4s}.hp-green{background:#4caf84}.hp-yellow{background:#d4a040}.hp-red{background:#d04040}.battle-log{max-height:150px;overflow-y:auto;font-size:0.75rem;color:#999;padding:8px;background:#0a0a12;border-radius:8px;border:1px solid #1a1a25;line-height:1.6}.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s}@keyframes fadeIn{from{opacity:0}to{opacity:1}}.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:420px;width:90%;box-shadow:0 20px 50px rgba(0,0,0,0.6);text-align:center}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2a2a35;border-radius:4px}</style></head><body><div class="game-container" id="gameContainer" function pullGacha(){const rand=Math.random();let cum=0,sel=ROLE_POOL[0];for(const r of ROLE_POOL){cum+=r.probability;if(rand<=cum){sel=r;break}}const nr={...sel,uid:generateUid(),hp:sel.maxHp,maxHp:sel.maxHp,qi:0,maxQi:100};playerInventory.push(nr);return nr}
function pullGacha10(){const res=[];let hasRare=false;for(let i=0;i<10;i++){const r=pullGacha();res.push(r);if(['blue','purple','gold','red'].includes(r.rarity))hasRare=true}if(!hasRare){const rp=ROLE_POOL.filter(r=>['blue','purple','gold','red'].includes(r.rarity));const g=rp[Math.floor(Math.random()*rp.length)];const last=res[9];const idx=playerInventory.findIndex(r=>r.uid===last.uid);if(idx>=0)playerInventory.splice(idx,1);const nr={...g,uid:generateUid(),hp:g.maxHp,maxHp:g.maxHp,qi:0,maxQi:100};playerInventory.push(nr);res[9]=nr}return res}
function renderAll(){document.getElementById('stoneCount').textContent=spiritStones;const c=document.getElementById('teamPreview');let h='';for(let i=0;i<3;i++){const uid=team[i];const r=uid?getRoleByUid(uid):null;if(r){h+=`<div class="team-slot filled card-rarity-${r.rarity}" data-slot="${i}" onclick="removeFromTeam(${i})"><div style="font-size:1.5rem;">${r.emoji}</div><div style="font-size:0.65rem;font-weight:bold;">${r.name}</div><div style="font-size:0.55rem;">${r.realm}</div></div>`}else{h+=`<div class="team-slot empty-slot" data-slot="${i}" onclick="openInventoryForSlot(${i})">➕</div>`}}c.innerHTML=h;const bb=document.getElementById('battleLogBox'),ld=document.getElementById('battleLog'),ad=document.getElementById('battleActions');if(battleState&&battleState.active){bb.style.display='block';ld.innerHTML=battleState.log.map(l=>`<div class="${l.cls||'log-info'}">${l.text}</div>`).join('');if(battleState.phase==='player_turn'&&!battleState.ended){ad.innerHTML=`<button class="btn btn-primary btn-sm" onclick="battleNormalAttack()">⚔️ 普通攻击</button><button class="btn btn-secondary btn-sm" onclick="battleSkill()">✨ ${battleState.playerActive?.skillName||'技能'}</button><button class="btn btn-danger btn-sm" onclick="fleeBattle()">🏃 撤退</button>`}else if(battleState.ended){ad.innerHTML=`<button class="btn btn-primary btn-sm" onclick="resetAfterBattle()">✅ 返回</button>`}else{ad.innerHTML=`<span style="color:#666;">敌方回合中...</span>`}}else{bb.style.display='none'}}
function renderInventoryModal(slot=-1){const mod=document.getElementById('modalContainer');const sort=[...playerInventory].sort((a,b)=>{const o={red:0,gold:1,purple:2,blue:3,green:4,white:5};return(o[a.rarity]||99)-(o[b.rarity]||99)});let h=`<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()"><h3 style="color:#d4a574;">📦 我的卡牌 (${playerInventory.length})</h3><div class="inventory-grid">`;for(const r of sort){const inT=team.includes(r.uid);h+=`<div class="inv-card card-rarity-${r.rarity} ${inT?'selected':''}" onclick="${slot>=0?`selectForSlot('${r.uid}',${slot})`:`toggleTeamMembership('${r.uid}')`}"><span style="font-size:1.5rem;">${r.emoji}</span><span style="font-weight:bold;font-size:0.7rem;">${r.name}</span><span style="font-size:0.6rem;">${r.realm}</span><span style="font-size:0.55rem;">⭐${r.stars} ${r.rarityName}</span>${inT?'<span style="color:#f0c060;">[编队中]</span>':''}</div>`}if(playerInventory.length===0)h+='<div style="grid-column:1/-1;color:#555;padding:30px;">暂无卡牌</div>';h+=`</div><button class="btn btn-secondary btn-sm" style="margin-top:10px;" onclick="closeModal()">关闭</button></div></div>`;mod.innerHTML=h}
function renderGachaModal(results=null){const mod=document.getElementById('modalContainer');let rh='';if(results&&results.length){rh='<div class="gacha-result">';for(const r of results){rh+=`<div class="gacha-card card-rarity-${r.rarity}"><span style="font-size:1.8rem;">${r.emoji}</span><span style="font-weight:bold;font-size:0.7rem;">${r.name}</span><span style="font-size:0.6rem;">${r.realm}</span></div>`}rh+='</div>'}let h=`<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()"><h3 style="color:#d4a574;">✨ 仙缘抽卡</h3><p style="color:#999;">灵石：<b style="color:#f0d6b8;">${spiritStones}</b> 💎</p><div class="btn-row"><button class="btn btn-primary" onclick="doSinglePull()">单抽 (100💎)</button><button class="btn btn-secondary" onclick="doTenPull()">十连抽 (900💎) 保底仙品</button></div>${rh}<button class="btn btn-secondary btn-sm" style="margin-top:10px;" onclick="closeModal()">关闭</button></div></div>`;mod.innerHTML=h}
function renderBattleModal(){if(!battleState||!battleState.active)return;const mod=document.getElementById('modalContainer');const p=battleState.playerActive,e=battleState.enemyActive;if(!p||!e)return;let h=`<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" style="max-width:480px;" onclick="event.stopPropagation()"><h3 style="color:#d4a574;">⚔️ 仙道对决</h3><div class="battle-field"><div class="battle-side"><div>敌方: ${e.emoji} ${e.name} (${e.realm})</div><div class="hp-bar-outer"><div class="hp-bar-inner ${e.hp/e.maxHp>0.6?'hp-green':e.hp/e.maxHp>0.3?'hp-yellow':'hp-red'}" style="width:${Math.max(0,e.hp/e.maxHp*100)}%"></div></div><span>HP:${Math.max(0,e.hp)}/${e.maxHp}</span></div><div class="vs-divider">⚡ VS ⚡</div><div class="battle-side"><div>我方: ${p.emoji} ${p.name} (${p.realm})</div><div class="hp-bar-outer"><div class="hp-bar-inner ${p.hp/p.maxHp>0.6?'hp-green':p.hp/p.maxHp>0.3?'hp-yellow':'hp-red'}" style="width:${Math.max(0,p.hp/p.maxHp*100)}%"></div></div><span>HP:${Math.max(0,p.hp)}/${p.maxHp}</span></div></div><div class="battle-log" style="max-height:120px;margin-top:8px;text-align:left;">${battleState.log.map(l=>`<div class="${l.cls||'log-info'}">${l.text}</div>`).join('')}</div><div class="btn-row" style="margin-top:10px;">`;if(battleState.phase==='player_turn'&&!battleState.ended){h+=`<button class="btn btn-primary btn-sm" onclick="battleNormalAttack()">⚔️ 普通攻击</button><button class="btn btn-secondary btn-sm" onclick="battleSkill()">✨ ${p.skillName}</button><button class="btn btn-danger btn-sm" onclick="fleeBattle()">🏃 撤退</button>`}else if(battleState.ended){h+=`<button class="btn btn-primary btn-sm" onclick="resetAfterBattle()">✅ 返回</button>`}else{h+=`<span style="color:#666;">敌方回合中...</span>`}h+=`</div></div></div>`;mod.innerHTML=h}
function renderGMPanel(){const mod=document.getElementById('modalContainer');let h=`<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()" style="max-width:480px;"><h3 style="color:#ff5555;">🛠️ GM 管理员面板</h3><div style="display:flex; gap:8px; margin:10px 0; align-items:center;"><span>灵石：</span><input id="gmStoneInput" type="number" value="${spiritStones}" style="width:100px; background:#1a1a25; color:#fff; border:1px solid #444; border-radius:8px; padding:5px;"><button class="btn btn-primary btn-sm" onclick="gmSetStones()">修改</button></div><div class="btn-row" style="margin-bottom:10px;"><button class="btn btn-secondary btn-sm" onclick="gmAddAllRoles()">📦 一键获得全部角色</button><button class="btn btn-danger btn-sm" onclick="gmClearInventory()">🗑️ 清空背包</button></div><div style="margin:10px 0; font-size:0.8rem; color:#aaa;">指定添加角色：</div><select id="gmRoleSelect" style="background:#1a1a25; color:#fff; border:1px solid #444; border-radius:8px; padding:5px; width:100%; margin-bottom:10px;">${ROLE_POOL.map(r=>`<option value="${r.id}">${r.emoji} ${r.name} (${r.rarityName})</option>`).join('')}</select><button class="btn btn-primary btn-sm btn-block" onclick="gmAddSpecificRole()">添加此角色</button><button class="btn btn-secondary btn-sm btn-block" style="margin-top:8px;" onclick="closeModal()">关闭面板</button></div></div>`;mod.innerHTML=h}
function gmSetStones(){const v=parseInt(document.getElementById('gmStoneInput').value);if(!isNaN(v)&&v>=0){spiritStones=v;renderAll();renderGMPanel()}}
function gmAddAllRoles(){ROLE_POOL.forEach(r=>{const nr={...r,uid:generateUid(),hp:r.maxHp,maxHp:r.maxHp,qi:0,maxQi:100};playerInventory.push(nr)});renderAll();alert('全部角色已加入背包！')}
function gmClearInventory(){playerInventory=[];team=[null,null,null];uidCounter=0;renderAll();closeModal();alert('背包与编队已清空。')}
function gmAddSpecificRole(){const id=document.getElementById('gmRoleSelect').value;const t=ROLE_POOL.find(r=>r.id===id);if(t){const nr={...t,uid:generateUid(),hp:t.maxHp,maxHp:t.maxHp,qi:0,maxQi:100};playerInventory.push(nr);renderAll();alert(`已添加 ${t.name}`)}}
function removeFromTeam(s){team[s]=null;renderAll()}
function toggleTeamMembership(uid){const idx=team.indexOf(uid);if(idx>=0)team[idx]=null;else{const em=team.findIndex(s=>s===null);if(em>=0)team[em]=uid;else team[0]=uid}renderAll();renderInventoryModal()}
function selectForSlot(uid,s){const ex=team.indexOf(uid);if(ex>=0&&ex!==s)team[ex]=null;team[s]=uid;renderAll();closeModal()}
function openInventoryForSlot(s){renderInventoryModal(s)}
function openInventory(){renderInventoryModal(-1)}
function openGacha(results=null){renderGachaModal(results)}
function closeModal(){document.getElementById('modalContainer').innerHTML='';renderAll()}
function doSinglePull(){if(spiritStones<100){alert('灵石不足！');return}spiritStones-=100;const r=pullGacha();renderAll();renderGachaModal([r])}
function doTenPull(){if(spiritStones<900){alert('灵石不足！');return}spiritStones-=900;const r=pullGacha10();renderAll();renderGachaModal(r)}
function quickGacha10(){doTenPull()}
function addStones(){spiritStones+=300;renderAll()}
function startBattle(){const v=team.filter(u=>u&&getRoleByUid(u));if(!v.length){alert('请先编队！');return}const pc=v.map(u=>{const r=getRoleByUid(u);return{...r,hp:r.maxHp,qi:20,maxQi:100,isPlayer:!0,dotEffects:[],buffEffects:[]}});const ec=[];const pool=ROLE_POOL.filter(r=>['white','green','blue','purple','gold'].includes(r.rarity));for(let i=0;i<2+Math.floor(Math.random()*2);i++){const t=pool[Math.floor(Math.random()*pool.length)];ec.push({...t,uid:'enemy_'+i,hp:t.maxHp,qi:15+Math.floor(Math.random()*20),maxQi:100,isPlayer:!1,dotEffects:[],buffEffects:[]})}battleState={active:!0,playerTeam:pc,enemyTeam:ec,playerActiveIndex:0,enemyActiveIndex:0,playerActive:pc[0],enemyActive:ec[0],phase:'player_turn',ended:!1,winner:null,log:[{text:'⚔️ 战斗开始！',cls:'log-info'},{text:`我方: ${pc.map(r=>r.name).join('、')}`,cls:'log-info'},{text:`敌方: ${ec.map(r=>r.name).join('、')}`,cls:'log-info'}],turnCount:0};renderAll();renderBattleModal()}
function updateActive(){if(!battleState||!battleState.active)return;let p=battleState.playerActiveIndex;while(p<battleState.playerTeam.length&&battleState.playerTeam[p].hp<=0)p++;if(p>=battleState.playerTeam.length)battleState.playerActive=null;else{battleState.playerActiveIndex=p;battleState.playerActive=battleState.playerTeam[p]}let e=battleState.enemyActiveIndex;while(e<battleState.enemyTeam.length&&battleState.enemyTeam[e].hp<=0)e++;if(e>=battleState.enemyTeam.length)battleState.enemyActive=null;else{battleState.enemyActiveIndex=e;battleState.enemyActive=battleState.enemyTeam[e]}if(!battleState.playerActive&&!battleState.ended)endBattle('enemy');else if(!battleState.enemyActive&&!battleState.ended)endBattle('player')}
function endBattle(w){battleState.ended=!0;battleState.active=!1;battleState.winner=w;battleState.phase='ended';if(w==='player'){const rw=150+Math.floor(Math.random()*200);spiritStones+=rw;battleState.log.push({text:`🎉 胜利！+${rw}💎`,cls:'log-info'})}else{const ls=Math.floor(Math.random()*40);spiritStones=Math.max(0,spiritStones-ls);battleState.log.push({text:`💀 败北... -${ls}💎`,cls:'log-dmg'})}renderAll();renderBattleModal()}
function execAtk(att,def,isSkill){let dmg=isSkill?att.atk*(att.skillMultiplier||2):att.atk;dmg=Math.max(5,Math.floor(dmg-def.def*0.4));const crit=Math.random()<(isSkill?0.2:0.08);if(crit)dmg=Math.floor(dmg*1.8);const map={white:0,green:1,blue:2,purple:3,gold:4,red:5};const diff=(map[att.rarity]||0)-(map[def.rarity]||0);if(diff>0)dmg=Math.floor(dmg*(1+diff*0.12));def.hp-=dmg;battleState.log.push({text:`${att.emoji}${att.name} ${isSkill?'【'+att.skillName+'】':''} → ${def.name} -${dmg}${crit?'💥暴击！':''}`,cls:crit?'log-crit':'log-dmg'});if(isSkill&&att.lifestealRatio){const heal=Math.floor(dmg*att.lifestealRatio);att.hp=Math.min(att.maxHp,att.hp+heal)}if(isSkill&&att.dotDamage&&def.hp>0){def.dotEffects.push({dmg:att.dotDamage,turns:att.dotTurns||2})}if(isSkill&&att.healRatio){const heal=Math.floor(att.maxHp*att.healRatio);att.hp=Math.min(att.maxHp,att.hp+heal)}if(def.hp<=0){def.hp=0;battleState.log.push({text:`💀 ${def.name}阵亡`,cls:'log-dmg'})}}
function battleNormalAttack(){if(!battleState||battleState.phase!=='player_turn'||battleState.ended)return;execAtk(battleState.playerActive,battleState.enemyActive,!1);afterPlayerAction()}
function battleSkill(){if(!battleState||battleState.phase!=='player_turn'||battleState.ended)return;const p=battleState.playerActive;if(!p)return;if((p.qi||0)<p.skillCost){battleState.log.push({text:'⚠️灵力不足',cls:'log-dmg'});renderBattleModal();return}p.qi-=p.skillCost;execAtk(p,battleState.enemyActive,!0);afterPlayerAction()}
function afterPlayerAction(){updateActive();if(battleState.ended){renderAll();renderBattleModal();return}battleState.phase='enemy_turn';renderAll();renderBattleModal();setTimeout(enemyAction,800)}
function enemyAction(){if(!battleState||battleState.ended||battleState.phase!=='enemy_turn')return;const e=battleState.enemyActive,p=battleState.playerActive;if(!e||!p){updateActive();renderBattleModal();return}e.qi=Math.min(100,(e.qi||0)+25);p.qi=Math.min(100,(p.qi||0)+20);if(e.qi>=e.skillCost&&Math.random()<0.5){e.qi-=e.skillCost;execAtk(e,p,!0)}else execAtk(e,p,!1);updateActive();if(battleState.ended){renderAll();renderBattleModal();return}battleState.phase='player_turn';battleState.turnCount++;battleState.log.push({text:`▶ 第${battleState.turnCount+1}回合`,cls:'log-info'});renderAll();renderBattleModal()}
function fleeBattle(){if(!battleState||battleState.ended)return;spiritStones=Math.max(0,spiritStones-25);battleState.log.push({text:'🏃 撤退 -25💎',cls:'log-dmg'});battleState.ended=!0;battleState.active=!1;battleState.winner='enemy';renderAll();renderBattleModal()}
function resetAfterBattle(){battleState=null;closeModal();renderAll()}
document.getElementById('gameTitle').addEventListener('click',function(){gmClickCount++;if(gmClickCount>=5){gmClickCount=0;renderGMPanel()}setTimeout(()=>{if(gmClickCount>0)gmClickCount=0},2000)});
initGame();
</script></body></html>
