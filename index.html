<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙途·问道 Enhanced</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #12121a;
            --border: #2a2a3a;
            --text: #e0e0e0;
            --accent: #ff6b6b;
            --success: #51cf66;
            --info: #4dabf7;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ffd43b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            user-select: none;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .stat-label {
            font-weight: 600;
        }
        
        .stat-value {
            color: var(--info);
        }
        
        button {
            background: linear-gradient(135deg, var(--accent), #ff5252);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .gacha-btn {
            flex: 1;
            min-width: 100px;
        }
        
        .character-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .character-card:hover {
            border-color: var(--accent);
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.2);
        }
        
        .character-card.selected {
            border-color: var(--success);
            background: linear-gradient(135deg, #0d3818, #1a5c2d);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .char-name {
            font-weight: bold;
            font-size: 16px;
        }
        
        .stars {
            color: #ffd43b;
            font-size: 14px;
        }
        
        .rarity-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 5px;
        }
        
        .rarity-red {
            background: #ff6b6b;
            color: white;
        }
        
        .rarity-gold {
            background: #ffd43b;
            color: #000;
        }
        
        .rarity-purple {
            background: #cc5de8;
            color: white;
        }
        
        .rarity-blue {
            background: #4dabf7;
            color: white;
        }
        
        .rarity-green {
            background: #51cf66;
            color: white;
        }
        
        .rarity-white {
            background: #adb5bd;
            color: white;
        }
        
        .card-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
            margin: 8px 0;
        }
        
        .stat {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 6px;
            border-radius: 3px;
        }
        
        .star-upgrade {
            background: linear-gradient(135deg, #ffd43b, #ffb700);
            color: #000;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            margin-top: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .star-upgrade:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(255, 180, 0, 0.4);
        }
        
        .star-upgrade:disabled,
        .star-upgrade.disabled {
            background: #6c757d;
            color: #fff;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .team-slot {
            background: rgba(0, 0, 0, 0.5);
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .team-slot:hover {
            border-color: var(--accent);
            background: rgba(255, 107, 107, 0.1);
        }
        
        .team-slot.filled {
            border-style: solid;
            background: linear-gradient(135deg, rgba(81, 207, 102, 0.1), rgba(77, 171, 247, 0.1));
            border-color: var(--success);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-box {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--accent);
        }
        
        .gacha-result {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 15px 0;
        }
        
        .gacha-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 2px solid;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            animation: popIn 0.5s ease-out;
        }
        
        .gacha-card.new {
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(81, 207, 102, 0.3);
        }
        
        .gacha-card.duplicate {
            border-color: var(--accent);
            opacity: 0.8;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .upgrade-panel {
            background: linear-gradient(135deg, rgba(255, 180, 0, 0.1), rgba(255, 107, 107, 0.1));
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        
        .upgrade-panel h3 {
            color: var(--accent);
            margin-bottom: 10px;
        }
        
        .upgrade-stat {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 13px;
        }
        
        .upgrade-stat .old {
            color: #adb5bd;
            text-decoration: line-through;
        }
        
        .upgrade-stat .new {
            color: var(--success);
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="title" id="gameTitle">🎴 仙途·问道</div>
        <div class="stat-row">

// ==================== 全局游戏状态 ====================
let spiritStones = 500;
let playerInventory = [];
let team = [null, null, null];
let uidCounter = 0;
let battleState = null;
let gmClickCount = 0;

// ==================== 工具函数 ====================
function generateUid() {
    return 'uid_' + uidCounter++;
}

function getRoleByUid(uid) {
    return playerInventory.find(r => r.uid === uid);
}

// ==================== 升星系统 ====================
function getStarUpgradeStats(character, newStars) {
    const starBonus = (newStars - character.stars) * 0.15;
    return {
        atk: Math.floor(character.atk * (1 + starBonus)),
        def: Math.floor(character.def * (1 + starBonus)),
        hp: Math.floor(character.maxHp * (1 + starBonus))
    };
}

function upgradeCharacterStar(uid) {
    const char = getRoleByUid(uid);
    if (!char) return false;
    
    const maxStars = 6;
    const nextStars = Math.min(char.stars + 1, maxStars);
    
    if (char.stars >= maxStars) {
        alert('该角色已达最高星级！');
        return false;
    }
    
    const upgradeCost = char.stars * 100;
    if (spiritStones < upgradeCost) {
        alert(`升星需要 ${upgradeCost} 灵石，当前不足！`);
        return false;
    }
    
    spiritStones -= upgradeCost;
    char.stars = nextStars;
    
    const newStats = getStarUpgradeStats(char, nextStars);
    char.atk = newStats.atk;
    char.def = newStats.def;
    char.maxHp = newStats.hp;
    char.hp = newStats.hp;
    
    const message = `${char.name} ⭐ 升星成功！\n当前星级：${char.stars}⭐`;
    alert(message);
    
    renderAll();
    return true;
}

// ==================== 抽卡系统 ====================
function pullGacha() {
    const rand = Math.random();
    let cum = 0, selected = ROLE_POOL[0];
    
    for (const role of ROLE_POOL) {
        cum += role.probability;
        if (rand <= cum) {
            selected = role;
            break;
        }
    }
    
    return {
        ...selected,
        uid: generateUid(),
        stars: selected.baseStars,
        hp: selected.hp,
        maxHp: selected.hp,
        qi: 0,
        maxQi: 100
    };
}

function pullGacha10() {
    const results = [];
    let hasRare = false;
    
    for (let i = 0; i < 10; i++) {
        const r = pullGacha();
        results.push(r);
        if (['red', 'gold', 'purple'].includes(r.rarity)) hasRare = true;
    }
    
    if (!hasRare) {
        const rp = ROLE_POOL.filter(r => ['red', 'gold', 'purple'].includes(r.rarity));
        results[9] = {
            ...rp[Math.floor(Math.random() * rp.length)],
            uid: generateUid(),
            stars: 1,
            hp: ROLE_POOL[0].hp,
            maxHp: ROLE_POOL[0].hp,
            qi: 0,
            maxQi: 100
        };
    }
    
    return results;
}

function handleGachaPull(newCharacters) {
    const results = [];
    
    for (const newChar of newCharacters) {
        const existing = playerInventory.find(c => c.id === newChar.id);
        
        if (existing) {
            // 重复角色升星
            existing.stars = Math.min(6, existing.stars + 1);
            const bonusStats = getStarUpgradeStats(existing, existing.stars);
            existing.atk = bonusStats.atk;
            existing.def = bonusStats.def;
            existing.maxHp = bonusStats.hp;
            existing.hp = bonusStats.hp;
            
            results.push({
                ...newChar,
                isDuplicate: true,
                targetChar: existing
            });
        } else {
            playerInventory.push(newChar);
            results.push({
                ...newChar,
                isDuplicate: false
            });
        }
    }
    
    return results;
}

// ==================== 渲染函数 ====================
function renderAll() {
    document.getElementById('stoneCount').textContent = spiritStones;
    document.getElementById('charCount').textContent = playerInventory.length;
    
    const teamPreview = document.getElementById('teamPreview');
    let html = '';
    
    for (let i = 0; i < 3; i++) {
        const uid = team[i];
        const role = uid ? getRoleByUid(uid) : null;
        
        html += `<div class="team-slot ${role ? 'filled' : ''}" onclick="openInventoryForSlot(${i})">`;
        if (role) {
            html += `
                <div style="width: 100%;">
                    <div style="font-weight: bold; color: var(--success);">${role.name}</div>
                    <div style="font-size: 12px; color: var(--text);">⭐ ${role.stars} | HP: ${role.hp}/${role.maxHp}</div>
                    <div style="font-size: 11px; color: #adb5bd; margin-top: 5px;">${role.realm}</div>
                </div>
            `;
        } else {
            html += '<span style="color: #6c757d;">+ 点击选择角色</span>';
        }
        html += '</div>';
    }
    
    teamPreview.innerHTML = html;
}

function renderInventoryModal(slot = -1) {
    const sortedChars = [...playerInventory].sort((a, b) => {
        const rarityOrder = { red: 0, gold: 1, purple: 2, blue: 3, green: 4, white: 5 };
        const rarityDiff = rarityOrder[a.rarity] - rarityOrder[b.rarity];
        return rarityDiff !== 0 ? rarityDiff : b.stars - a.stars;
    });
    
    let html = '<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()">';
    html += '<div class="modal-header">📦 角色背包 (' + playerInventory.length + ')</div>';
    
    if (sortedChars.length === 0) {
        html += '<div style="text-align: center; padding: 20px; color: #adb5bd;">背包为空，快去抽卡吧！</div>';
    } else {
        html += '<div style="max-height: 600px; overflow-y: auto;">';
        for (const char of sortedChars) {
            const isSelected = slot >= 0 && team[slot] === char.uid;
            
            html += `<div class="character-card ${isSelected ? 'selected' : ''}" onclick="selectForSlot('${char.uid}', ${slot})">`;
            html += `<div class="card-header">`;
            html += `<span class="char-name">${char.name}</span>`;
            html += `<span class="stars">⭐${char.stars}</span>`;
            html += `</div>`;
            html += `<div><span class="rarity-badge rarity-${char.rarity}">${char.rarityName}</span>${char.realm}</div>`;
            html += `<div class="card-stats">`;
            html += `<div class="stat">⚔️ ATK: ${char.atk}</div>`;
            html += `<div class="stat">🛡️ DEF: ${char.def}</div>`;
            html += `<div class="stat">❤️ HP: ${char.hp}/${char.maxHp}</div>`;
            html += `<div class="stat">💫 技能: ${char.skillName}</div>`;
            html += `</div>`;
            
            if (char.stars < 6) {
                const upgradeCost = char.stars * 100;
                html += `<div class="star-upgrade" onclick="event.stopPropagation(); upgradeCharacterStar('${char.uid}')">`;
                html += `升星 (需 ${upgradeCost}💎) → ⭐${char.stars + 1}`;
                html += `</div>`;
                
                const newStats = getStarUpgradeStats(char, char.stars + 1);
                html += `<div class="upgrade-panel">`;
                html += `<h3>升星后属性预览</h3>`;
                html += `<div class="upgrade-stat"><span>ATK:</span><span><span class="old">${char.atk}</span> → <span class="new">${newStats.atk}</span></span></div>`;
                html += `<div class="upgrade-stat"><span>DEF:</span><span><span class="old">${char.def}</span> → <span class="new">${newStats.def}</span></span></div>`;
                html += `<div class="upgrade-stat"><span>HP:</span><span><span class="old">${char.maxHp}</span> → <span class="new">${newStats.hp}</span></span></div>`;
                html += `</div>`;
            } else {
                html += `<div class="star-upgrade disabled">已满星（6⭐）</div>`;
            }
            
            html += `</div>`;
        }
        html += '</div>';
    }
    
    html += '</div></div>';
    document.getElementById('modalContainer').innerHTML = html;
}

function renderGachaModal(results = null) {
    const mod = document.getElementById('modalContainer');
    let html = '<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()">';
    
    if (results && results.length) {
        html += '<div class="modal-header">🎉 抽卡结果</div>';
        html += '<div class="gacha-result">';
        
        for (const r of results) {
            const cardClass = r.isDuplicate ? 'duplicate' : 'new';
            const icon = r.isDuplicate ? '⭐' : '✨';
            
            html += `<div class="gacha-card ${cardClass}">`;
            html += `<div style="font-size: 20px; margin-bottom: 5px;">${icon}</div>`;
            html += `<div style="font-weight: bold; font-size: 14px;">${r.name}</div>`;
            html += `<div style="font-size: 12px; color: var(--accent);">⭐${r.isDuplicate ? r.targetChar.stars : r.stars}</div>`;
            html += `<span class="rarity-badge rarity-${r.rarity}">${r.rarityName}</span>`;
            
            if (r.isDuplicate) {
                html += `<div style="font-size: 11px; color: var(--success); margin-top: 5px;">已升星！</div>`;
            }
            
            html += `</div>`;
        }
        
        html += '</div>';
    }
    
    html += `<button onclick="closeModal()" style="width: 100%; margin-top: 15px;">确定</button>`;
    html += '</div></div>';
    mod.innerHTML = html;
}

// ==================== 界面交互 ====================
function selectForSlot(uid, slot) {
    if (slot >= 0) {
        const existingIdx = team.indexOf(uid);
        if (existingIdx >= 0 && existingIdx !== slot) {
            team[existingIdx] = null;
        }
        team[slot] = uid;
    }
    renderAll();
    closeModal();
}

function openInventoryForSlot(slot) {
    renderInventoryModal(slot);
}

function openInventory() {
    renderInventoryModal(-1);
}

function closeModal() {
    document.getElementById('modalContainer').innerHTML = '';
    renderAll();
}

// ==================== 抽卡操作 ====================
function doSinglePull() {
    if (spiritStones < 100) {
        alert('灵石不足！');
        return;
    }
    
    spiritStones -= 100;
    const newChar = pullGacha();
    const results = handleGachaPull([newChar]);
    renderAll();
    renderGachaModal(results);
}

function doTenPull() {
    if (spiritStones < 900) {
        alert('灵石不足！');
        return;
    }
    
    spiritStones -= 900;
    const newChars = pullGacha10();
    const results = handleGachaPull(newChars);
    renderAll();
    renderGachaModal(results);
}

// ==================== 战斗系统 ====================
function startBattle() {
    const playerTeamUids = team.filter(u => u && getRoleByUid(u));
    if (!playerTeamUids.length) {
        alert('请先编队！');
        return;
    }
    
    alert('⚔️ 战斗功能开发中...');
}

// ==================== GM面板 ====================
function renderGMPanel() {
    const mod = document.getElementById('modalContainer');
    let html = `<div class="modal-overlay" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()" style="max-width: 500px;">`;
    
    html += `<div class="modal-header">⚙️ GM面板</div>`;
    html += `
        <div style="margin: 15px 0;">
            <label style="display: block; margin-bottom: 5px;">设置灵石数量:</label>
            <input id="gmStoneInput" type="number" value="${spiritStones}" style="width: 100%; padding: 8px; background: var(--border); border: 1px solid var(--border); border-radius: 5px; color: var(--text);" />
            <button onclick="gmSetStones()" style="width: 100%; margin-top: 10px;">确定</button>
        </div>
        <div style="margin: 15px 0;">
            <label style="display: block; margin-bottom: 5px;">添加指定角色:</label>
            <select id="gmRoleSelect" style="width: 100%; padding: 8px; background: var(--border); border: 1px solid var(--border); border-radius: 5px; color: var(--text);">
    `;
    
    for (const role of ROLE_POOL) {
        html += `<option value="${role.id}">${role.name}</option>`;
    }
    
    html += `
            </select>
            <button onclick="gmAddSpecificRole()" style="width: 100%; margin-top: 10px;">添加</button>
        </div>
        <div class="button-group">
            <button onclick="gmAddAllRoles()" style="flex: 1;">添加全部角色</button>
            <button onclick="gmClearInventory()" style="flex: 1; background: var(--accent);">清空背包</button>
        </div>
    `;
    
    html += `</div></div>`;
    mod.innerHTML = html;
}

function gmSetStones() {
    const val = parseInt(document.getElementById('gmStoneInput').value);
    if (!isNaN(val) && val >= 0) {
        spiritStones = val;
        renderAll();
        renderGMPanel();
    }
}

function gmAddAllRoles() {
    ROLE_POOL.forEach(r => {
        const newRole = {
            ...r,
            uid: generateUid(),
            stars: 1,
            hp: r.hp,
            maxHp: r.hp,
            qi: 0,
            maxQi: 100
        };
        playerInventory.push(newRole);
    });
    
    renderAll();
    alert('全部角色已加入背包！');
}

function gmClearInventory() {
    playerInventory = [];
    team = [null, null, null];
    uidCounter = 0;
    renderAll();
    closeModal();
    alert('背包与编队已清空。');
}

function gmAddSpecificRole() {
    const id = document.getElementById('gmRoleSelect').value;
    const template = ROLE_POOL.find(r => r.id === id);
    
    if (template) {
        const newRole = {
            ...template,
            uid: generateUid(),
            stars: 1,
            hp: template.hp,
            maxHp: template.hp,
            qi: 0,
            maxQi: 100
        };
        playerInventory.push(newRole);
        renderAll();
        renderGMPanel();
    }
}

// ==================== 初始化 ====================
function initGame() {
    const starter = [{
        ...ROLE_POOL.find(r => r.id === 'chijingzi'),
        uid: generateUid(),
        stars: 1,
        hp: ROLE_POOL.find(r => r.id === 'chijingzi').maxHp,
        maxHp: ROLE_POOL.find(r => r.id === 'chijingzi').maxHp,
        qi: 0,
        maxQi: 100
    }, {
        ...ROLE_POOL.find(r => r.id === 'yuding'),
        uid: generateUid(),
        stars: 1,
        hp: ROLE_POOL.find(r => r.id === 'yuding').maxHp,
        maxHp: ROLE_POOL.find(r => r.id === 'yuding').maxHp,
        qi: 0,
        maxQi: 100
    }];
    
    playerInventory = starter;
    team = [starter[0].uid, starter[1].uid, null];
    renderAll();
}

// ==================== 事件监听 ====================
document.getElementById('gameTitle').addEventListener('click', function() {
    gmClickCount++;
    if (gmClickCount >= 5) {
        gmClickCount = 0;
        renderGMPanel();
    }
    setTimeout(() => {
        if (gmClickCount > 0) gmClickCount = 0;
    }, 2000);
});

initGame();
</script>
</body>
</html>
